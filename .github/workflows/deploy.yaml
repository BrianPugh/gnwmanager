name: Build package and push to PyPi
on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to upload binaries to the GitHub Release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Needed for uv-dynamic-versioning to read git tags

      - name: arm-none-eabi-gcc GNU Arm Embedded Toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1.8.1

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build stm32 firmwares
        run: make -j4

      - name: Build package
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Upload binaries to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            gnwmanager/firmware.bin
            gnwmanager/unlock.bin
            dist/*

  publish:
    needs: build
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Trusted publishing to PyPI via OIDC
    environment:
      name: pypi
      url: https://pypi.org/p/gnwmanager
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
